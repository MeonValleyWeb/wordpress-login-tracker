<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 772 250" width="772" height="250">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00a0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0073aa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="772" height="250" fill="url(#bgGradient)"/>
  
  <!-- Decorative elements -->
  <circle cx="700" cy="50" r="80" fill="#005a87" opacity="0.4"/>
  <circle cx="100" cy="200" r="100" fill="#005a87" opacity="0.3"/>
  
  <!-- User/Activity icon group -->
  <g transform="translate(140, 125) scale(2.8)">
    <!-- User silhouette -->
    <circle cx="0" cy="-8" r="10" fill="white"/>
    <path d="M-18 20 Q-18 0 0 0 Q18 0 18 20 L18 25 L-18 25 Z" fill="white"/>
    
    <!-- Activity dot -->
    <circle cx="15" cy="-20" r="5" fill="#00d084"/>
    
    <!-- Clock indicator -->
    <path d="M15 -20 L15 -26 A6 6 0 0 1 21 -20" fill="none" stroke="white" stroke-width="1.5"/>
  </g>
  
  <!-- Small decorative user icons -->
  <g transform="translate(600, 100) scale(0.8)" opacity="0.3">
    <circle cx="0" cy="-8" r="10" fill="white"/>
    <path d="M-18 20 Q-18 0 0 0 Q18 0 18 20 L18 25 L-18 25 Z" fill="white"/>
  </g>
  
  <g transform="translate(650, 150) scale(0.6)" opacity="0.2">
    <circle cx="0" cy="-8" r="10" fill="white"/>
    <path d="M-18 20 Q-18 0 0 0 Q18 0 18 20 L18 25 L-18 25 Z" fill="white"/>
  </g>
</svg>
